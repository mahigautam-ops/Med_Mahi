name: med_caller
description: "MedCaller Healthcare App UI"
publish_to: 'none'
version: 1.0.0+2002

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  url_launcher: ^6.2.1
  cupertino_icons: ^1.0.6
  intl: ^0.20.2
  firebase_core: ^2.32.0
  cloud_firestore: ^4.17.5
  firebase_auth: ^4.19.6
  flutter_phone_direct_caller: ^2.1.1
  permission_handler: ^11.3.1
  flutter_contacts: ^1.1.9+1
  call_log: ^6.0.0
  shared_preferences: ^2.3.3
  http: ^1.6.0
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
